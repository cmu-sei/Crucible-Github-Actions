name: Build & Publish Image

on:
  workflow_call:
    inputs:
      imageName:
        description: "Base name of the image (e.g., myorg/myimage)"
        type: string
        required: true
      tagName:
        description: "Optional explicit tag to use (overrides auto-detection)"
        type: string
        required: false
      dockerfilePath:
        description: "Path to your project's Dockerfile"
        required: false
        default: ./Dockerfile
        type: string
      additionalTarget:
        description: "An additional Docker build target stage to build and push"
        required: false
        type: string
      push:
        description: "Use to override default push behavior. If false, will not push, even from a release."
        type: string
        required: false
      versionMode:
        description: "none | npm | csproj"
        type: string
        required: false
        default: "none"
      versionFiles:
        description: "Newline-separated file paths to update"
        type: string
        required: false

    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_PASSWORD:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Push Condition
        id: push_condition
        # Push unless the calling workflow was triggered by a pull_request, or the push input was set
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Workflow triggered by pull_request. Will not push."
            PUSH=false
          else
            echo "Not a pull request"
            if [ -n "$INPUT_PUSH" ]; then
              echo "Push override input detected: '$INPUT_PUSH'. Setting push to: $INPUT_PUSH"
              PUSH=$INPUT_PUSH
            else
              echo "No push override. Will push by default."
              PUSH=true
            fi
          fi

          echo "Final push decision: $PUSH"
          echo "push=$PUSH" >> $GITHUB_OUTPUT
        env:
          INPUT_PUSH: ${{ inputs.push }}

      - name: Determine version from tag
        id: version
        run: |
          if [[ -n "${{ inputs.tagName }}" ]]; then
            TAG="${{ inputs.tagName }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG=""
          fi

          if [[ -z "$TAG" ]]; then
            echo "No tag found; skipping version handling."
            echo "tag=" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
            exit 0
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update app version files
        if: steps.push_condition.outputs.push == 'true' && steps.version.outputs.tag != '' && inputs.versionMode != 'none' && inputs.versionFiles != ''
        run: |
          echo "Updating version to: $VERSION"
          mapfile -t FILES <<< "${{ inputs.versionFiles }}"

          for f in "${FILES[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "Version file not found: $f"
              exit 1
            fi
          done

          if [[ "${{ inputs.versionMode }}" == "npm" ]]; then
            for f in "${FILES[@]}"; do
              node -e "
                const fs = require('fs');
                const p = '$f';
                const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
                pkg.version = process.env.VERSION;
                fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
              "
            done
          elif [[ "${{ inputs.versionMode }}" == "csproj" ]]; then
            for f in "${FILES[@]}"; do
              perl -0777 -i -pe "s|<Version>.*?</Version>|<Version>$VERSION</Version>|g" "$f"
            done
          else
            echo "Unknown versionMode: ${{ inputs.versionMode }}"
            exit 1
          fi

          git diff

      - name: Commit version bump
        if: steps.push_condition.outputs.push == 'true' && steps.version.outputs.tag != '' && inputs.versionMode != 'none' && inputs.versionFiles != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No version change needed."
            exit 0
          fi

          mapfile -t FILES <<< "${{ inputs.versionFiles }}"
          git add "${FILES[@]}"
          git commit -m "chore: set version to $VERSION"

      - name: Force-move tag to include version bump commit
        if: steps.push_condition.outputs.push == 'true' && steps.version.outputs.tag != '' && inputs.versionMode != 'none' && inputs.versionFiles != ''
        run: |
          git tag -f "$TAG"
          git push origin -f "refs/tags/$TAG"

      - name: Re-checkout moved tag (so build uses updated code)
        if: steps.push_condition.outputs.push == 'true' && steps.version.outputs.tag != '' && inputs.versionMode != 'none' && inputs.versionFiles != ''
        run: |
          git fetch --tags --force
          git checkout -f "tags/$TAG"
          git rev-parse HEAD

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.push_condition.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker Meta for primary image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.imageName }}
          tags: |
            type=raw,value=${{ inputs.tagName }},enable=${{ inputs.tagName != '' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch,enable=${{ inputs.tagName == '' && !startsWith(github.ref, 'refs/tags/') }}
          flavor: |
            latest=false

      # Generate the tags for the additional target based on the primary tags
      - name: Generate Additional Target Tags
        if: inputs.additionalTarget != ''
        id: target_tags
        run: |
          TARGET_TAGS=""
          readarray -t TAG_ARRAY <<< "${{ steps.meta.outputs.tags }}"

          for full_tag in "${TAG_ARRAY[@]}"; do
            # Extract just the tag part after the colon
            tag_part="${full_tag##*:}"
            # Get the base image name
            image_name="${full_tag%%:*}"

            # Skip if tag_part is empty
            if [[ -z "$tag_part" ]]; then
              echo "Skipping tag with empty tag_part for: $full_tag"
              continue
            fi

            new_tag="${image_name}:${tag_part}-${{ inputs.additionalTarget }}"

            if [[ ! -z "$TARGET_TAGS" ]]; then
              TARGET_TAGS="${TARGET_TAGS},"
            fi
            TARGET_TAGS="${TARGET_TAGS}${new_tag}"
          done

          echo "tags=${TARGET_TAGS}" >> $GITHUB_OUTPUT
          echo "Generated additional target tags: ${TARGET_TAGS}"

      - name: Build and push default stage
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfilePath }}
          push: ${{ steps.push_condition.outputs.push }}
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push additional target
        if: inputs.additionalTarget != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfilePath }}
          target: ${{ inputs.additionalTarget }}
          push: ${{ steps.push_condition.outputs.push }}
          pull: true
          tags: ${{ steps.target_tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
