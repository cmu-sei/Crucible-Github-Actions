name: Build & Publish Image

on:
  workflow_call:
    inputs:
      imageName:
        description: "Base name of the image (e.g., myorg/myimage)"
        type: string
        required: true
      tagName:
        description: "Optional explicit tag to use (overrides auto-detection)"
        type: string
        required: false
      dockerfilePath:
        description: "Path to your project's Dockerfile"
        required: false
        default: ./Dockerfile
        type: string
      additionalTarget:
        description: "An additional Docker build target stage to build and push"
        required: false
        type: string
      push:
        description: "Use to override default push behavior. If false, will not push, even from a release."
        type: string
        required: false
      versionMode:
        description: "How to inject version at build time: none | npm | csproj"
        type: string
        required: false
        default: "none"
      versionFiles:
        description: "Newline-separated file paths to update (used by npm mode to set version in package.json files before build)"
        type: string
        required: false
      buildArgs:
        description: "Optional docker build args (newline-separated: key=value)"
        type: string
        required: false
      platforms:
        description: "Comma-separated list of target platforms (e.g., linux/amd64,linux/arm64)"
        type: string
        required: false
        default: "linux/amd64,linux/arm64"
      preBuildCommands:
        description: "Optional shell commands to run before docker build (e.g. fetch artifacts)"
        type: string
        required: false

    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_PASSWORD:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine Push Condition
        id: push_condition
        # Push unless the calling workflow was triggered by a pull_request, or the push input was set
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Workflow triggered by pull_request. Will not push."
            PUSH=false
          else
            echo "Not a pull request"
            if [ -n "$INPUT_PUSH" ]; then
              echo "Push override input detected: '$INPUT_PUSH'. Setting push to: $INPUT_PUSH"
              PUSH=$INPUT_PUSH
            else
              echo "No push override. Will push by default."
              PUSH=true
            fi
          fi

          echo "Final push decision: $PUSH"
          echo "push=$PUSH" >> $GITHUB_OUTPUT
        env:
          INPUT_PUSH: ${{ inputs.push }}

      - name: Pre-build commands
        if: steps.push_condition.outputs.push == 'true' && inputs.preBuildCommands != ''
        shell: bash
        run: |
          set -euo pipefail
          echo "Running pre-build commands..."
          ${{ inputs.preBuildCommands }}

      - name: Determine version from tag
        id: version
        run: |
          if [[ -n "$INPUT_TAG_NAME" ]]; then
            TAG="$INPUT_TAG_NAME"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG=""
          fi

          if [[ -z "$TAG" ]]; then
            echo "No tag found; skipping version handling."
            echo "tag=" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Strip leading 'v' to get numeric semver only
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        env:
          INPUT_TAG_NAME: ${{ inputs.tagName }}

      - name: Inject version into package.json files (npm)
        if: inputs.versionMode == 'npm' && steps.version.outputs.version != '' && inputs.versionFiles != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Setting npm version to: $VERSION"
          mapfile -t FILES <<< "$INPUT_VERSION_FILES"
          for f in "${FILES[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::error::Version file not found: $f"
              exit 1
            fi
            dir=$(dirname "$f")
            pushd "$dir" > /dev/null
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            popd > /dev/null
            echo "Updated $f to version $VERSION"
          done
        env:
          INPUT_VERSION_FILES: ${{ inputs.versionFiles }}

      - name: Prepare build args for .NET version (csproj)
        id: version_build_args
        if: inputs.versionMode == 'csproj' && steps.version.outputs.version != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Injecting .NET version as build args: $VERSION"
          {
            echo "args<<EOF"
            echo "VERSION=$VERSION"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Set up QEMU
        if: contains(inputs.platforms, 'arm64')
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: steps.push_condition.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker Meta for primary image
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.imageName }}
          tags: |
            type=raw,value=${{ inputs.tagName }},enable=${{ inputs.tagName != '' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch,enable=${{ inputs.tagName == '' && !startsWith(github.ref, 'refs/tags/') }}
          flavor: |
            latest=false

      - name: Generate Additional Target Tags
        if: inputs.additionalTarget != ''
        id: target_tags
        run: |
          TARGET_TAGS=""
          mapfile -t TAG_ARRAY <<< "${{ steps.meta.outputs.tags }}"

          for full_tag in "${TAG_ARRAY[@]}"; do
            # Extract just the tag part after the colon
            tag_part="${full_tag##*:}"
            # Get the base image name
            image_name="${full_tag%%:*}"

            # Skip if tag_part is empty
            if [[ -z "$tag_part" ]]; then
              echo "Skipping tag with empty tag_part for: $full_tag"
              continue
            fi

            new_tag="${image_name}:${tag_part}-${{ inputs.additionalTarget }}"

            if [[ -n "$TARGET_TAGS" ]]; then
              TARGET_TAGS="${TARGET_TAGS},"
            fi
            TARGET_TAGS="${TARGET_TAGS}${new_tag}"
          done

          echo "tags=${TARGET_TAGS}" >> $GITHUB_OUTPUT
          echo "Generated additional target tags: ${TARGET_TAGS}"

      - name: Combine build args
        id: combined_build_args
        run: |
          {
            echo "args<<EOF"
            if [[ -n "$USER_ARGS" ]]; then
              echo "$USER_ARGS"
            fi
            if [[ -n "$VERSION_ARGS" ]]; then
              echo "$VERSION_ARGS"
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT
        env:
          USER_ARGS: ${{ inputs.buildArgs }}
          VERSION_ARGS: ${{ steps.version_build_args.outputs.args }}

      - name: Build and push default stage
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfilePath }}
          platforms: ${{ inputs.platforms }}
          push: ${{ steps.push_condition.outputs.push }}
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.combined_build_args.outputs.args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push additional target
        if: inputs.additionalTarget != ''
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfilePath }}
          target: ${{ inputs.additionalTarget }}
          platforms: ${{ inputs.platforms }}
          push: ${{ steps.push_condition.outputs.push }}
          pull: true
          tags: ${{ steps.target_tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.combined_build_args.outputs.args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
