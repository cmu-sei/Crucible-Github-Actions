name: Update Helm Chart

description: "Updates a Helm chart's app version, bumps chart versions, and opens a PR in the helm-charts repository."

inputs:
  app_name:
    description: "Display name of the application (used in PR title and commit message)."
    required: true
  github_app_client_id:
    description: "GitHub App client ID used to mint a token for the Helm repo."
    required: false
    default: ""
  github_app_id:
    description: "Deprecated: GitHub App ID used to mint a token for the Helm repo. Use github_app_client_id instead."
    required: false
    default: ""
  github_app_private_key:
    description: "Private key for the GitHub App when minting a token."
    required: false
    default: ""
  chart_file:
    description: "Path (within the helm-charts repo) to the Chart.yaml for the application."
    required: true
  parent_chart_file:
    description: "Optional path to a parent Chart.yaml to bump."
    required: false
    default: ""
  helm_chart_repo:
    description: "Target Helm charts repository."
    required: false
    default: "cmu-sei/helm-charts"
  release_tag:
    description: "Release tag that triggered the workflow (e.g. v2.5.2)."
    required: false
    default: ${{ github.event.release.tag_name }}
  helm_repo_token:
    description: "Token with push and PR permissions for the Helm charts repository. Optional to use instead of a GitHub App."
    required: false
    default: ""
  # See the checkout actions docs (https://github.com/actions/checkout?tab=readme-ov-file#push-a-commit-using-the-built-in-token)
  #  for an example of the default actions bot user (https://api.github.com/users/github-actions%5Bbot%5D)
  git_user_name:
    description: "Git username for commits."
    required: false
    default: "github-actions[bot]"
  git_user_email:
    description: "Git user email for commits."
    required: false
    default: "41898282+github-actions[bot]@users.noreply.github.com"
  settings_file:
    description: "Path in the calling repo to the app settings file (e.g. Player.Api/appsettings.json). When set, enables the settings-sync phase."
    required: false
    default: ""
  settings_file_kind:
    description: "Strategy for parsing settings_file. One of: dotnet-appsettings, dotnet-conf, angular-settings. Required when settings_file is set."
    required: false
    default: ""
outputs:
  new_app_version:
    description: "Normalized application version extracted from the release tag."
    value: ${{ steps.update.outputs.new_app_version }}
  release_type:
    description: "Release type used when bumping chart versions."
    value: ${{ steps.update.outputs.release_type }}
  new_chart_version:
    description: "Updated chart version after the bump."
    value: ${{ steps.update.outputs.new_chart_version }}
  parent_chart_update:
    description: "JSON payload describing the parent chart version change, when applicable."
    value: ${{ steps.update.outputs.parent_chart_update }}
  chart_modified:
    description: "True when the application chart required modifications."
    value: ${{ steps.update.outputs.chart_modified }}
  branch_name:
    description: "Branch name suggested for the Helm charts pull request."
    value: ${{ steps.update.outputs.branch_name }}
  has_changes:
    description: "True when any chart files were updated."
    value: ${{ steps.update.outputs.has_changes }}
  settings_changed:
    description: "True when settings were added or removed between the previous release tag and this one."
    value: ${{ steps.update.outputs.settings_changed }}
  settings_added:
    description: "JSON object mapping added flattened setting keys to their leaf type."
    value: ${{ steps.update.outputs.settings_added }}
  settings_removed:
    description: "JSON array of removed flattened setting keys."
    value: ${{ steps.update.outputs.settings_removed }}
  previous_release_tag:
    description: "Resolved previous release tag (empty when no prior tag exists)."
    value: ${{ steps.update.outputs.previous_release_tag }}

runs:
  using: "composite"
  steps:
    - name: Derive Helm repo owner/name
      id: repo_meta
      shell: bash
      env:
        HELM_REPO: ${{ inputs.helm_chart_repo }}
      run: |
        if [[ "$HELM_REPO" != */* ]]; then
          echo "helm_chart_repo must be provided in the form <owner>/<repo> (e.g., cmu-sei/helm-charts)" >&2
          exit 1
        fi
        owner="${HELM_REPO%%/*}"
        name="${HELM_REPO#*/}"
        echo "owner=$owner" >> "$GITHUB_OUTPUT"
        echo "name=$name" >> "$GITHUB_OUTPUT"

    - name: Warn on deprecated github_app_id input
      if: inputs.github_app_id != ''
      shell: bash
      run: |
        echo "::warning::The 'github_app_id' input is deprecated. Migrate to 'github_app_client_id' (see https://github.com/actions/create-github-app-token/releases/tag/v3.1.0)."

    - name: Mint Helm charts app token
      id: mint_token
      if: >
        ((inputs.github_app_client_id != '') || (inputs.github_app_id != '')) &&
        (inputs.github_app_private_key != '')
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.github_app_client_id }}
        app-id: ${{ inputs.github_app_id }}
        private-key: ${{ inputs.github_app_private_key }}
        owner: ${{ steps.repo_meta.outputs.owner }}
        repositories: ${{ steps.repo_meta.outputs.name }}

    - name: Checkout source repository
      if: inputs.settings_file != ''
      uses: actions/checkout@v6
      with:
        repository: ${{ github.repository }}
        ref: ${{ inputs.release_tag }}
        path: source
        fetch-depth: 0

    - name: Checkout Helm charts repository
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.helm_chart_repo }}
        token: ${{ steps.mint_token.outputs.token || inputs.helm_repo_token || env.GH_TOKEN || github.token }}
        path: helm-charts
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"

    - name: Install Python dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install pyyaml "ruamel.yaml>=0.18,<1"
      shell: bash

    - name: Update Helm chart metadata
      id: update
      env:
        SOURCE_REPO: ${{ github.repository }}
      run: |
        python3 "${{ github.action_path }}/update_helm_chart.py" \
          --helm-repo-dir "helm-charts" \
          --chart-file "${{ inputs.chart_file }}" \
          --parent-chart-file "${{ inputs.parent_chart_file }}" \
          --release-tag "${{ inputs.release_tag }}" \
          --app-name "${{ inputs.app_name }}" \
          --github-output "$GITHUB_OUTPUT" \
          --settings-file "${{ inputs.settings_file }}" \
          --settings-file-kind "${{ inputs.settings_file_kind }}" \
          --source-repo "$SOURCE_REPO" \
          --app-repo-dir "source"
      shell: bash

    - name: Derive README path
      if: inputs.parent_chart_file != ''
      id: readme
      shell: bash
      env:
        PCF: ${{ inputs.parent_chart_file }}
      run: echo "path=$(dirname "$PCF")/README.md" >> "$GITHUB_OUTPUT"

    - name: Create feature branch
      if: steps.update.outputs.has_changes == 'true'
      working-directory: helm-charts
      run: git checkout -b "${{ steps.update.outputs.branch_name }}"
      shell: bash

    - name: Commit changes
      if: steps.update.outputs.has_changes == 'true'
      working-directory: helm-charts
      env:
        APP_NAME: ${{ inputs.app_name }}
        APP_VERSION: ${{ steps.update.outputs.new_app_version }}
      run: |
        git config user.name "${{ inputs.git_user_name }}"
        git config user.email "${{ inputs.git_user_email }}"
        git add -A
        git commit -m "update ${APP_NAME} chart to ${APP_VERSION}"
      shell: bash

    - name: Push branch
      if: steps.update.outputs.has_changes == 'true'
      working-directory: helm-charts
      run: git push --set-upstream origin "${{ steps.update.outputs.branch_name }}"
      shell: bash

    - name: Create pull request
      if: steps.update.outputs.has_changes == 'true'
      working-directory: helm-charts
      env:
        GH_TOKEN: ${{ steps.mint_token.outputs.token || inputs.helm_repo_token || env.GH_TOKEN || github.token }}
        GH_REPO: ${{ inputs.helm_chart_repo }}
        BRANCH: ${{ steps.update.outputs.branch_name }}
        APP_NAME: ${{ inputs.app_name }}
        APP_VERSION: ${{ steps.update.outputs.new_app_version }}
        RELEASE_TYPE: ${{ steps.update.outputs.release_type }}
        SOURCE_REPO: ${{ github.repository }}
        SETTINGS_CHANGED: ${{ steps.update.outputs.settings_changed }}
        SETTINGS_ADDED: ${{ steps.update.outputs.settings_added }}
        SETTINGS_REMOVED: ${{ steps.update.outputs.settings_removed }}
        README_PATH: ${{ steps.readme.outputs.path }}
      run: |
        RELEASE_URL="https://github.com/${SOURCE_REPO}/releases/tag/${APP_VERSION}"
        PR_BODY="Automated update for ${APP_NAME} to version [${APP_VERSION}](${RELEASE_URL})."
        if [ "${SETTINGS_CHANGED}" = "true" ]; then
          SECTION=$(python3 "${{ github.action_path }}/render_pr_section.py" \
            --source-repo "${SOURCE_REPO}" \
            --release-tag "${APP_VERSION}" \
            --readme-path "${README_PATH}" \
            --added "${SETTINGS_ADDED:-{\}}" \
            --removed "${SETTINGS_REMOVED:-[]}")
          if [ -n "$SECTION" ]; then
            PR_BODY=$(printf '%s\n\n%s\n' "${PR_BODY}" "${SECTION}")
          fi
        fi
        if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
          echo "Pull request already exists for branch ${BRANCH}. Skipping creation."
        else
          gh pr create \
            --title "${APP_NAME} to ${APP_VERSION}" \
            --body "$PR_BODY" \
            --base "main" \
            --head "$BRANCH"
        fi
      shell: bash
